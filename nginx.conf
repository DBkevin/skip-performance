# Nginx 配置文件 - 皮肤科绩效管理系统
# 将此文件配置到 Nginx: sudo nginx -c /var/www/nginx.conf

user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # 基础优化
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10M;

    # Gzip压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript;

    # HTTP重定向到HTTPS
    server {
        listen 80;
        server_name clm.xmmylike.com;
        return 301 https://$server_name$request_uri;
    }

    # HTTPS服务 - clm.xmmylike.com
    server {
        listen 443 ssl http2;
        server_name clm.xmmylike.com;

        root /var/www/frontend/dist;
        index index.html;

        # SSL证书路径（申请后自动配置）
        ssl_certificate /etc/letsencrypt/live/clm.xmmylike.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/clm.xmmylike.com/privkey.pem;
        
        # SSL优化配置
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512;
        ssl_prefer_server_ciphers off;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:50m;
        ssl_session_tickets off;

        # HSTS头
        add_header Strict-Transport-Security "max-age=63072000" always;

        # 静态文件缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # SPA路由支持
        location / {
            try_files $uri $uri/ /index.html;
        }

        # API代理到后端
        location /api/ {
            proxy_pass http://127.0.0.1:8111;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # 超时设置
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # 安全头
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # 禁用易受攻击的HTTP方法
        if ($request_method !~ ^(GET|POST|HEAD)$ ) {
            return 403;
        }

        # 隐藏Nginx版本号
        server_tokens off;
    }

    # 默认服务器块 - 拒绝未知域名
    server {
        listen 80 default_server;
        server_name _;
        return 444;
    }
}